<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un guide | Les Zheros</title>
    <meta name="description" content="Création d'un guide de mission pour la guilde Les Zheros.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="assets/css/reset.css">
    <link rel="stylesheet" href="assets/css/admin.css">
    <script src="assets/js/admin.js" defer></script>
    <script src="assets/js/admin-guides.js" defer></script>
    <script src="assets/js/admin-rich-editor.js" defer></script>
</head>
<body class="admin-body">
    <div class="admin-app">
        <aside class="admin-sidebar" aria-label="Navigation administration">
            <a class="admin-brand" href="index.html">
                <img src="assets/img/logo.png" alt="">
                <span>Les Zheros</span>
            </a>

            <nav class="admin-nav">
                <a class="admin-nav__link" href="admin.html"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
                <p class="admin-nav__label">Contenus</p>
                <a class="admin-nav__link" href="admin-announcements.html"><i class="fa-solid fa-bullhorn"></i><span>Annonces</span></a>
                <a class="admin-nav__link" href="admin-missions.html"><i class="fa-solid fa-scroll"></i><span>Missions</span></a>
                <a class="admin-nav__link is-active" href="admin-guides.html"><i class="fa-solid fa-book-open"></i><span>Guides</span></a>
                <a class="admin-nav__link" href="admin-gallery.html"><i class="fa-regular fa-images"></i><span>Galerie</span></a>
                <a class="admin-nav__link" href="admin-stuffs.html"><i class="fa-solid fa-shield-halved"></i><span>Catalogue stuffs</span></a>
                <p class="admin-nav__label">Activités</p>
                <a class="admin-nav__link" href="admin-lottery.html"><i class="fa-solid fa-dice"></i><span>Loterie</span></a>
                <a class="admin-nav__link" href="admin-ranking.html"><i class="fa-solid fa-trophy"></i><span>Classement</span></a>
                <p class="admin-nav__label">Communauté</p>
                <a class="admin-nav__link" href="admin-users.html"><i class="fa-solid fa-users"></i><span>Utilisateurs</span></a>
                <a class="admin-nav__link" href="admin-validations.html"><i class="fa-solid fa-circle-check"></i><span>Validations</span></a>
                <a class="admin-nav__link" href="admin-comments.html"><i class="fa-solid fa-comments"></i><span>Commentaires</span></a>
                <p class="admin-nav__label">Administration</p>
                <a class="admin-nav__link" href="admin-roles.html"><i class="fa-solid fa-user-shield"></i><span>Rôles</span></a>
                <a class="admin-nav__link" href="admin-settings.html"><i class="fa-solid fa-gear"></i><span>Paramètres</span></a>
            </nav>
        </aside>

        <main class="admin-main">
            <header class="admin-topbar">
                <div class="admin-breadcrumb">
                    <button class="admin-menu-button" type="button" aria-label="Ouvrir la navigation">
                        <i class="fa-solid fa-table-columns"></i>
                    </button>
                    <span></span>
                    <p>Guides / Créer</p>
                </div>

                <div class="admin-actions">
                    <a class="admin-secondary-button" href="admin-guides.html">
                        <i class="fa-solid fa-arrow-left"></i>
                        <span>Retour àux guides</span>
                    </a>
                </div>
            </header>

            <section class="admin-content admin-content--editor">
                <form id="guide-form" class="admin-guide-editor admin-guide-editor--cms" action="#" method="post">
                    <section class="admin-guide-compose">
                        <label class="admin-guide-title-field" for="guide-title">
                            <span>Titre du guide</span>
                            <input id="guide-title" name="title" type="text" placeholder="Ex: Placement pour le Plateau de Ush" required>
                        </label>

                        <label class="admin-guide-summary" for="guide-summary">
                            <span>Résumé</span>
                            <textarea id="guide-summary" name="summary" rows="2" placeholder="Ex: Placement conseillé, ordre de focus et rappels importants."></textarea>
                        </label>

                        <div class="admin-rich-editor admin-rich-editor--document" data-rich-editor>
                            <div class="admin-rich-editor__toolbar" aria-label="Outils de mise en forme">
                                <button type="button" data-editor-command="bold" title="Gras"><i class="fa-solid fa-bold"></i></button>
                                <button type="button" data-editor-command="italic" title="Italique"><i class="fa-solid fa-italic"></i></button>
                                <button type="button" data-editor-command="formatBlock" data-editor-value="h2" title="Titre"><i class="fa-solid fa-heading"></i></button>
                                <button type="button" data-editor-command="formatBlock" data-editor-value="blockquote" title="Citation"><i class="fa-solid fa-quote-right"></i></button>
                                <button type="button" data-editor-command="insertUnorderedList" title="Liste"><i class="fa-solid fa-list-ul"></i></button>
                                <button type="button" data-editor-command="insertOrderedList" title="Liste numérotée"><i class="fa-solid fa-list-ol"></i></button>
                                <button type="button" data-editor-link title="Lien"><i class="fa-solid fa-link"></i></button>
                                <button type="button" data-editor-command="insertImage" title="Image"><i class="fa-regular fa-image"></i></button>
                                <button type="button" data-editor-command="justifyLeft" title="Aligner à gauche"><i class="fa-solid fa-align-left"></i></button>
                                <button type="button" data-editor-command="justifyCenter" title="Centrer"><i class="fa-solid fa-align-center"></i></button>
                                <button type="button" data-editor-command="justifyRight" title="Aligner à droite"><i class="fa-solid fa-align-right"></i></button>
                            </div>
                            <div class="admin-rich-editor__surface admin-rich-editor__surface--document" contenteditable="true" data-editor-surface aria-label="Guide" data-placeholder="Rédige le guide ici..."></div>
                            <textarea id="guide-content" name="content" required data-editor-input hidden></textarea>
                        </div>
                    </section>

                    <aside class="admin-guide-editor__aside admin-guide-editor__aside--cms">
                        <section class="admin-guide-side-card">
                            <div class="admin-guide-switch-row">
                                <span>Publié</span>
                                <label class="admin-switch">
                                    <input type="checkbox" name="published" checked>
                                    <span></span>
                                </label>
                            </div>
                        </section>

                        <section class="admin-guide-side-card admin-guide-side-card--cover">
                            <label class="admin-guide-cover-picker" for="guide-cover">
                                <img class="admin-guide-cover" src="assets/img/card-mission/type.png" alt="" data-guide-cover-preview>
                                <span>Aperçu</span>
                            </label>
                            <input id="guide-cover" class="admin-guide-cover-input" name="cover" type="file" accept="image/*" data-guide-cover-input>
                        </section>

                        <section class="admin-guide-side-card">
                            <label class="admin-field" for="guide-mission">
                                <span>Mission liée</span>
                                <select id="guide-mission" name="mission" required>
                                    <option>Plateau de Ush</option>
                                    <option>Sentence de la Balance</option>
                                    <option>Les concepts brumeux</option>
                                    <option>Forge de Missiz Frizz</option>
                                </select>
                            </label>

                            <label class="admin-field" for="guide-level">
                                <span>Difficulté</span>
                                <select id="guide-level" name="level">
                                    <option>Normal</option>
                                    <option>Compliqué</option>
                                    <option>Très technique</option>
                                </select>
                            </label>
                        </section>

                        <section class="admin-guide-side-card">
                            <label class="admin-field" for="guide-date">
                                <span>Publication</span>
                                <input id="guide-date" name="published_at" type="datetime-local">
                            </label>
                        </section>

                        <button class="admin-create-button admin-guide-save-button" type="submit">
                            <i class="fa-solid fa-floppy-disk"></i>
                            <span>Enregistrer</span>
                        </button>
                    </aside>
                </form>
            </section>
        </main>
    </div>
</body>
</html>
