<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Zheros | Guilde Dofus</title>
    <meta name="description" content="">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Crimson+Pro:ital,wght@0,200..900;1,200..900&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="assets/css/style.css">
    <script src="assets/js/main.js" defer></script>
</head>
<body>
    <main class="login-page">
        <img src="assets/img/logo.png" alt="">
        <h1>Se connecter</h1>
        <div class="panel login-card">
            <form action="" class="form-stack">
                <div class="field">
                    <label for="login-email">Email</label>
                    <input id="login-email" type="text" name="identifier" autocomplete="username">
                </div>
                <div class="field">
                    <div class="login-field-head">
                        <label for="login-password">Mot de passe</label>
                        <a href="forgot-password.html">Mot de passe oublié ?</a>
                    </div>
                    <input id="login-password" type="password" name="password" autocomplete="current-password">
                </div>
                <label class="check">
                    <input type="checkbox" name="remember_me">
                    <span>Se souvenir de moi</span>
                </label>
                <button type="submit" class="btn btn--primary login-submit">
                    <span>Se connecter</span>
                    <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
                </button>
            </form>
        </div>
    </main>
</body>
</html>
